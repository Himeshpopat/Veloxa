{% extends 'base.html' %}

{% block title %}
My Profile
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm">

                <div class="card-body p-4">

                    <h2 class="mb-4">
                        My Profile
                    </h2>

                    <form method="POST" id="profile-form">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    👤 Customer Name
                                </label>

                                <input type="text" name="name" value="{{ customer.name }}" class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    🏪 Shop Name
                                </label>

                                <input type="text" name="shop_name" value="{{ customer.shop_name }}"
                                    class="form-control" required>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    📞 Mobile Number
                                </label>

                                <input type="text" name="mobile" value="{{ customer.mobile }}" class="form-control"
                                    required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    📍 City
                                </label>

                                <input type="text" name="city" value="{{ customer.city }}" class="form-control"
                                    required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                🏠 Address
                            </label>

                            <textarea name="address" rows="3" class="form-control"
                                required>{{ customer.address }}</textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                📧 Email Address
                            </label>

                            <input type="email" value="{{ customer.email }}" class="form-control" readonly>

                        </div>

                    </form>

                    <div class="profile-actions mt-3">

                        <button type="submit" form="profile-form" class="btn btn-success">
                            Update Profile
                        </button>

                        <form method="POST" action="/logout" class="inline-action-form">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <button type="submit" class="btn btn-danger">
                                Logout
                            </button>
                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
