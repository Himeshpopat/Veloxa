<!DOCTYPE html>
<html>

<head>
    <title>My Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h1 class="mb-4">My Cart</h1>

        {% for item in cart_data %}

        <div class="card mb-3">

            <div class="card-body">

                <h5 class="card-title">
                    {{ item.product.name }}
                </h5>

                <p class="card-text">
                    Price: ₹{{ item.product.price }}
                </p>

                <p class="card-text">
                    Quantity: {{ item.quantity }}
                </p>

            </div>

        </div>

        {% endfor %}

    </div>

</body>

</html>
