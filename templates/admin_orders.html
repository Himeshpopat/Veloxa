<!DOCTYPE html>
<html>

<head>
    <title>All Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <h2>All Orders</h2>

    {% for order in orders %}

    <p>
        Order ID: {{ order.id }}
    </p>

    <p>
        Customer ID: {{ order.customer_id }}
    </p>

    <p>
        Status: {{ order.status }}
    </p>

    {% if order.status == 'Pending' %}

    <a href="/confirm_order/{{ order.id }}" class="btn btn-success">
        Confirm Order
    </a>

    <a href="/cancel_order/{{ order.id }}" class="btn btn-danger">
        Cancel Order
    </a>

    {% endif %}

    {% if order.status == 'Confirmed' %}

    <a href="/deliver_order/{{ order.id }}" class="btn btn-primary">
        Deliver Order
    </a>

    {% endif %}

    <hr>

    {% endfor %}

</body>

</html>
