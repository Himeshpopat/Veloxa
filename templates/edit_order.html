<!DOCTYPE html>
<html>

<head>
    <title>Edit Order</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <h2>Edit Order</h2>

    <div class="mb-3">
        <a href="/products?order_id={{ order_id }}" class="btn btn-primary">
            Add Products
        </a>
    </div>

    <hr>

    {% for item in order_data %}

    <p>
        Product: {{ item.product.name }}
    </p>

    <p>
        Quantity: {{ item.quantity }}
    </p>

    <a href="/increase_order_quantity/{{ item.item_id }}" class="btn btn-success">
        +
    </a>

    <a href="/decrease_order_quantity/{{ item.item_id }}" class="btn btn-danger">
        -
    </a>

    <a href="/remove_order_item/{{ item.item_id }}" class="btn btn-dark">
        Remove
    </a>

    <hr>

    {% endfor %}

</body>

</html>
