{% extends 'base.html' %}

{% block title %}
{% if product %}
Edit Product
{% else %}
Add Product
{% endif %}
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm border-0 add-product-card">

                <div class="card-body p-4">

                    <h2 class="add-prod-header mb-4">

                        {% if product %}
                        Edit Product
                        {% else %}
                        Add Product
                        {% endif %}

                    </h2>

                    <form method="POST" enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">
                                Product Name
                            </label>

                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   value="{{ product.name if product else '' }}"
                                   required>

                        </div>

                        {% if product %}

                        <div class="mb-3">

                            <label class="form-label">
                                Current Image
                            </label>

                            <div>

                                <img src="/static/product_images/{{ product.image }}"
                                     class="product-preview"
                                     onerror="this.src='/static/images/no-image.png'">

                            </div>

                        </div>

                        {% endif %}

                        <div class="mb-3">

                            <label class="form-label">
                                Product Image
                            </label>

                            <input type="file"
                                   name="image"
                                   class="form-control"
                                   {% if not product %}required{% endif %}>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    MRP
                                </label>

                                <input type="number"
                                       step="0.01"
                                       name="mrp"
                                       class="form-control"
                                       value="{{ product.mrp if product else '' }}"
                                       required>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Wholesale Price
                                </label>

                                <input type="number"
                                       step="0.01"
                                       name="price"
                                       class="form-control"
                                       value="{{ product.price if product else '' }}"
                                       required>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">
                                    Stock
                                </label>

                                <input type="number"
                                       name="stock"
                                       class="form-control"
                                       value="{{ product.stock if product else '' }}"
                                       required>

                            </div>

                        </div>

                        <div class="product-form-actions d-flex gap-2 mt-3">

                            <button type="submit"
                                    class="btn btn-success">

                                {% if product %}
                                Update Product
                                {% else %}
                                Add Product
                                {% endif %}

                            </button>

                            <a href="/products"
                               class="btn btn-secondary">
                                Back to Products
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
