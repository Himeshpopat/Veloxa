<!DOCTYPE html>
<html>

<head>
    <title>Add Product</title>
</head>

<body>

    <h1>Add Product</h1>

    <form method="POST" enctype="multipart/form-data">

        <label>Product Name:</label>
        <input type="text" name="name" value="{{ product.name if product else '' }}">

        <br><br>

        <label>Description:</label>
        <input type="text" name="description" value="{{ product.description if product else '' }}">

        {% if product %}

        <p>Current Image:</p>

        <img src="/static/product_images/{{ product.image }}" width="150">

        <br><br>

        {% endif %}

        <label>Product Image</label>

        <input type="file" name="image" class="form-control">

        <br><br>

        <label>MRP:</label>
        <input type="number" step="0.01" name="mrp">

        <br><br>

        <label>Selling Price:</label>
        <input type="number" step="0.01" name="price">

        <br><br>

        <label>Stock:</label>
        <input type="number" name="stock">

        <br><br>

        <button type="submit">Add Product</button>

    </form>

</body>

</html>
